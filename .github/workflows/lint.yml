name: Count INO Files

on:
  push:

jobs:
  count-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Count .ino Files
        run: |
          count=$(find . -name "*.ino" | wc -l)
          echo "Number of .ino files: $count"
